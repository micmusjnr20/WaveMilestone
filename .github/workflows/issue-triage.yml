name: Issue Triage

on:
  issues:
    types: [opened, edited]

jobs:
  label:
    name: Auto-label issue
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const body = (context.payload.issue.body || '').toLowerCase();
            const content = title + ' ' + body;

            const labels = [];

            if (/bug|error|crash|panic|incorrect|wrong/i.test(content)) {
              labels.push('bug');
            }
            if (/feature|enhancement|request|new|add.*support/i.test(content)) {
              labels.push('enhancement');
            }
            if (/documentation|docs|readme|guide|explain/i.test(content)) {
              labels.push('documentation');
            }
            if (/security|vulnerability|audit|exploit/i.test(content)) {
              labels.push('security');
            }
            if (/test|testing|coverage|integration/i.test(content)) {
              labels.push('testing');
            }
            if (/contract|soroban|smart.c?ontract/i.test(content)) {
              labels.push('contract');
            }
            if (/ci|cd|workflow|deployment|deploy|action/i.test(content)) {
              labels.push('infrastructure');
            }
            if (/question|help|how.?to|confused|clarif/i.test(content)) {
              labels.push('question');
            }

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: labels
              });
            }
